<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الإدارة – HR System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body { font-family: 'Cairo', system-ui, sans-serif; }
    .table-wrap table { direction: rtl; }
    .table-wrap thead th { text-align: right; text-transform: none; letter-spacing: 0; }
    .table-wrap tbody td { text-align: right; }
    .table-wrap thead th[style*="text-align:center"] { text-align: center !important; }
    .table-wrap tbody td[style*="text-align:center"] { text-align: center !important; }
    .table-wrap thead th:last-child { text-align: left; }
    .table-wrap tbody td:last-child { text-align: left; }
    .page-hero {
      background: linear-gradient(135deg, #141a2e 0%, #1a1f3a 60%, #0f1628 100%);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 24px 28px; display: flex; align-items: center;
      justify-content: space-between; gap: 20px; flex-wrap: wrap;
    }
    .hero-left { display: flex; align-items: center; gap: 16px; }
    .hero-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
    }
    .hero-icon svg { width: 26px; height: 26px; color: #fff; }
    .hero-title { font-size: 20px; font-weight: 700; margin-bottom: 3px; }
    .hero-sub { font-size: 13px; color: var(--text-muted); }
    .action-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
      border: none; cursor: pointer; transition: all .18s; white-space: nowrap;
      font-family: inherit;
    }
    .action-btn svg { width: 13px; height: 13px; }
    .btn-annual  { background: var(--green-dim);  color: var(--green); }
    .btn-annual:hover  { background: #155233; }
    .btn-casual  { background: var(--blue-dim);   color: var(--blue); }
    .btn-casual:hover  { background: #1a3a7a; }
    .btn-perm    { background: var(--orange-dim); color: var(--orange); }
    .btn-perm:hover    { background: #4a2600; }
    .btn-deduct  { background: var(--red-dim);    color: var(--red); }
    .btn-deduct:hover  { background: #4a1010; }
    .actions-cell { display: flex; flex-wrap: wrap; gap: 5px; }
    .num-pill {
      display: inline-block; min-width: 36px; text-align: center;
      padding: 2px 8px; border-radius: 6px; font-weight: 600; font-size: 12px;
    }
    .num-green  { background: var(--green-dim);  color: var(--green); }
    .num-blue   { background: var(--blue-dim);   color: var(--blue); }
    .num-orange { background: var(--orange-dim); color: var(--orange); }
    .num-red    { background: var(--red-dim);    color: var(--red); }
    .num-zero   { background: var(--surface2);   color: var(--text-muted); }
    .emp-name-link { color: var(--blue); text-decoration: none; font-weight: 600; }
    .emp-name-link:hover { text-decoration: underline; }
    .form-row { display: flex; flex-direction: column; gap: 5px; }
    .form-row label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing:.05em; }
    .form-row input, .form-row textarea {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text);
      padding: 9px 12px; font-size: 13px; outline: none; font-family: inherit; width: 100%;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-row input:focus, .form-row textarea:focus {
      border-color: var(--blue); box-shadow: 0 0 0 3px rgba(79,142,247,.18);
    }
    .form-body { display: flex; flex-direction: column; gap: 14px; padding: 20px; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-muted); font-size: 13px; text-decoration: none; transition: color .18s;
    }
    .back-link:hover { color: var(--blue); }
    .back-link svg { width: 16px; height: 16px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
          </svg>
        </div>
        <span class="brand-name">HR<span class="accent">System</span></span>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <a class="btn btn-ghost" href="/">الرئيسية</a>
        <a class="btn btn-ghost" href="/departments-page">الإدارات</a>
      </div>
    </div>
  </header>

  <main class="main">
    <div>
      <a class="back-link" href="/departments-page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        العودة للإدارات
      </a>
    </div>

    <div class="page-hero">
      <div class="hero-left">
        <div class="hero-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          </svg>
        </div>
        <div>
          <div class="hero-title" id="deptTitle">جارٍ التحميل…</div>
          <div class="hero-sub" id="deptSub"></div>
        </div>
      </div>
    </div>

    <section class="kpi-grid" id="kpiRow"></section>

    <section class="table-card">
      <div class="table-header">
        <div style="display:flex;align-items:center;gap:10px">
          <h2 class="table-title">موظفو الإدارة</h2>
          <span class="badge" id="empCount">0</span>
        </div>
        <div class="search-wrap" style="max-width:260px">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="searchInput" class="search-input" placeholder="بحث بالاسم أو الكود…" oninput="filterTable()" />
        </div>
      </div>
      <div class="table-wrap">
        <table id="empTable">
          <thead>
            <tr>
              <th>الكود</th><th>الاسم</th><th>المسمى الوظيفي</th>
              <th style="text-align:center">سنوية (يوم)</th>
              <th style="text-align:center">عارضة (يوم)</th>
              <th style="text-align:center">إذن (ساعة)</th>
              <th style="text-align:center">خصم (أيام)</th>
              <th style="text-align:center">خصم (جنيه)</th>
              <th>إجراءات</th>
            </tr>
          </thead>
          <tbody id="empBody">
            <tr><td colspan="8" class="loading-row">جارٍ تحميل الموظفين…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Leave Modal -->
  <div class="modal-overlay" id="leaveModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <span class="modal-title" id="leaveModalTitle">إضافة إجازة</span>
        <button class="modal-close" onclick="closeModal('leaveModal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="form-body">
        <input type="hidden" id="leaveEmpId" /><input type="hidden" id="leaveType" />
        <div class="form-row"><label>عدد الأيام</label><input type="number" id="leaveDays" value="1" min="0.5" step="0.5" /></div>
        <div class="form-row"><label>التاريخ</label><input type="date" id="leaveDate" /></div>
        <div class="form-row"><label>ملاحظة (اختياري)</label><textarea id="leaveNote" rows="2" placeholder="مثلاً: إجازة عيد الأضحى"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('leaveModal')">إلغاء</button>
        <button class="btn btn-primary" onclick="submitLeave()">حفظ</button>
      </div>
    </div>
  </div>

  <!-- Permission Modal -->
  <div class="modal-overlay" id="permModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <span class="modal-title">إضافة إذن</span>
        <button class="modal-close" onclick="closeModal('permModal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="form-body">
        <input type="hidden" id="permEmpId" />
        <div class="form-row">
          <label>عدد الساعات (الحد الأقصى 4 ساعات شهرياً)</label>
          <input type="number" id="permHours" value="1" min="0.5" max="4" step="0.5" />
        </div>
        <div class="form-row"><label>التاريخ</label><input type="date" id="permDate" /></div>
        <div class="form-row"><label>ملاحظة (اختياري)</label><textarea id="permNote" rows="2" placeholder="مثلاً: مراجعة طبية"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('permModal')">إلغاء</button>
        <button class="btn btn-primary" onclick="submitPermission()">حفظ</button>
      </div>
    </div>
  </div>

  <!-- Deduction Modal -->
  <div class="modal-overlay" id="deductModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <span class="modal-title">إضافة خصم</span>
        <button class="modal-close" onclick="closeModal('deductModal')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="form-body">
        <input type="hidden" id="deductEmpId" />
        <div class="form-row">
          <label>نوع الخصم</label>
          <select id="deductType">
            <option value="days">أيام</option>
            <option value="money">مبلغ مالي</option>
          </select>
        </div>
        <div class="form-row"><label>القيمة</label><input type="number" id="deductAmount" value="0" min="0" step="0.5" /></div>
        <div class="form-row"><label>التاريخ</label><input type="date" id="deductDate" /></div>
        <div class="form-row"><label>السبب</label><textarea id="deductReason" rows="2" placeholder="مثلاً: تأخر متكرر"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('deductModal')">إلغاء</button>
        <button class="btn btn-primary" onclick="submitDeduction()">حفظ</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script>
    const deptName = decodeURIComponent(location.pathname.split('/department/')[1] || '');
    let allEmployees = [];

    function showToast(msg, type='success') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${type} show`;
      setTimeout(() => { t.className = 'toast'; }, 3500);
    }
    function numPill(val, cls) {
      const n = Number(val || 0);
      return `<span class="num-pill ${n>0?cls:'num-zero'}">${n%1===0?n:n.toFixed(1)}</span>`;
    }
    function deptShort(raw) {
      if (!raw) return '—';
      const re = /all\s*departments\s*>\s*القوة\s*>/i;
      if (re.test(raw)) return raw.replace(re,'').trim()||raw;
      const idx = raw.indexOf('القوة>');
      if (idx !== -1) return raw.slice(idx+'القوة>'.length).trim()||raw;
      return raw;
    }
    function todayISO() { return new Date().toISOString().slice(0,10); }
    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }
    document.querySelectorAll('.modal-overlay').forEach(o => {
      o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); });
    });

    function openLeaveModal(empId, type) {
      document.getElementById('leaveEmpId').value = empId;
      document.getElementById('leaveType').value = type;
      document.getElementById('leaveModalTitle').textContent = type==='annual'?'إضافة إجازة سنوية':'إضافة إجازة عارضة';
      document.getElementById('leaveDays').value = 1;
      document.getElementById('leaveDate').value = todayISO();
      document.getElementById('leaveNote').value = '';
      openModal('leaveModal');
    }
    function openPermModal(empId) {
      document.getElementById('permEmpId').value = empId;
      document.getElementById('permHours').value = 1;
      document.getElementById('permDate').value = todayISO();
      document.getElementById('permNote').value = '';
      openModal('permModal');
    }
    function openDeductModal(empId) {
      document.getElementById('deductEmpId').value = empId;
      document.getElementById('deductAmount').value = 0;
      document.getElementById('deductDate').value = todayISO();
      document.getElementById('deductReason').value = '';
      openModal('deductModal');
    }

    async function submitLeave() {
      const empId = document.getElementById('leaveEmpId').value;
      const body = { leave_type: document.getElementById('leaveType').value,
        days: parseFloat(document.getElementById('leaveDays').value),
        date: document.getElementById('leaveDate').value,
        note: document.getElementById('leaveNote').value };
      if (!body.date) { showToast('الرجاء اختيار التاريخ','error'); return; }
      const r = await fetch(`/employees/${empId}/leaves`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if (!r.ok) { showToast('فشل الحفظ','error'); return; }
      closeModal('leaveModal'); showToast('تم إضافة الإجازة ✓'); await loadEmployees();
    }
    async function submitPermission() {
      const empId = document.getElementById('permEmpId').value;
      const body = { hours: parseFloat(document.getElementById('permHours').value),
        date: document.getElementById('permDate').value,
        note: document.getElementById('permNote').value };
      if (!body.date) { showToast('الرجاء اختيار التاريخ','error'); return; }
      const r = await fetch(`/employees/${empId}/permissions`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if (!r.ok) { showToast('فشل الحفظ','error'); return; }
      closeModal('permModal'); showToast('تم إضافة الإذن ✓'); await loadEmployees();
    }
    async function submitDeduction() {
      const empId = document.getElementById('deductEmpId').value;
      const body = { 
        deduction_type: document.getElementById('deductType').value,
        amount: parseFloat(document.getElementById('deductAmount').value),
        date: document.getElementById('deductDate').value,
        reason: document.getElementById('deductReason').value 
      };
      if (!body.date) { showToast('الرجاء اختيار التاريخ','error'); return; }
      const r = await fetch(`/employees/${empId}/deductions`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if (!r.ok) { showToast('فشل الحفظ','error'); return; }
      closeModal('deductModal'); showToast('تم إضافة الخصم ✓'); await loadEmployees();
    }

    function renderRow(e) {
      const plusIco = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
      return `<tr>
        <td>${e.employee_code||'—'}</td>
        <td><a class="emp-name-link" href="/employee-page/${e.id}">${e.name}</a></td>
        <td>${e.job_title||'—'}</td>
        <td style="text-align:center">${numPill(e.total_annual_leave,'num-green')}</td>
        <td style="text-align:center">${numPill(e.total_casual_leave,'num-blue')}</td>
        <td style="text-align:center">${numPill(e.total_permission_hours,'num-orange')}</td>
        <td style="text-align:center">${numPill(e.total_deduction_days,'num-red')}</td>
        <td style="text-align:center">${numPill(e.total_deduction_money,'num-red')}</td>
        <td><div class="actions-cell">
          <button class="action-btn btn-annual" onclick="openLeaveModal(${e.id},'annual')">${plusIco} سنوية</button>
          <button class="action-btn btn-casual" onclick="openLeaveModal(${e.id},'casual')">${plusIco} عارضة</button>
          <button class="action-btn btn-perm" onclick="openPermModal(${e.id})">${plusIco} إذن</button>
          <button class="action-btn btn-deduct" onclick="openDeductModal(${e.id})">${plusIco} خصم</button>
        </div></td>
      </tr>`;
    }

    function filterTable() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const filtered = q ? allEmployees.filter(e =>
        (e.name||'').toLowerCase().includes(q)||(e.employee_code||'').toLowerCase().includes(q)) : allEmployees;
      document.getElementById('empCount').textContent = filtered.length;
      document.getElementById('empBody').innerHTML = filtered.length
        ? filtered.map(renderRow).join('')
        : '<tr><td colspan="8" class="loading-row">لا نتائج.</td></tr>';
    }

    async function loadEmployees() {
      try {
        const r = await fetch(`/departments/${encodeURIComponent(deptName)}/employees`);
        allEmployees = await r.json();
        document.getElementById('deptTitle').textContent = deptShort(deptName);
        document.getElementById('deptSub').textContent = `${allEmployees.length} موظف`;
        const tA=allEmployees.reduce((s,e)=>s+(e.total_annual_leave||0),0);
        const tC=allEmployees.reduce((s,e)=>s+(e.total_casual_leave||0),0);
        const tP=allEmployees.reduce((s,e)=>s+(e.total_permission_hours||0),0);
        const tDD=allEmployees.reduce((s,e)=>s+(e.total_deduction_days||0),0);
        const tDM=allEmployees.reduce((s,e)=>s+(e.total_deduction_money||0),0);
        const fmt = v => v%1===0?v:v.toFixed(1);
        document.getElementById('kpiRow').innerHTML = `
          <div class="kpi-card"><div class="kpi-icon kpi-green">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div><div class="kpi-body"><span class="kpi-label">إجازات سنوية</span><span class="kpi-value" style="color:var(--green)">${fmt(tA)}</span></div></div>
          <div class="kpi-card"><div class="kpi-icon kpi-blue">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div><div class="kpi-body"><span class="kpi-label">إجازات عارضة</span><span class="kpi-value" style="color:var(--blue)">${fmt(tC)}</span></div></div>
          <div class="kpi-card"><div class="kpi-icon kpi-orange">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div><div class="kpi-body"><span class="kpi-label">ساعات إذن</span><span class="kpi-value" style="color:var(--orange)">${fmt(tP)}</span></div></div>
          <div class="kpi-card"><div class="kpi-icon" style="background:var(--red-dim);color:var(--red)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            </div><div class="kpi-body"><span class="kpi-label">إجمالي الخصومات</span><span class="kpi-value" style="color:var(--red); font-size:18px">${fmt(tDD)} يوم | ${tDM.toLocaleString()} ج</span></div></div>`;
        filterTable();
      } catch {
        document.getElementById('empBody').innerHTML='<tr><td colspan="8" class="loading-row">فشل تحميل الموظفين.</td></tr>';
        showToast('فشل تحميل البيانات','error');
      }
    }

    document.addEventListener('DOMContentLoaded', loadEmployees);
  </script>
</body>
</html>
