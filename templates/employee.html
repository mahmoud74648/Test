<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ملف الموظف – نظام الموارد البشرية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body { font-family: 'Cairo', system-ui, sans-serif; }
    .profile-card {
      background: linear-gradient(135deg, #141a2e 0%, #1a1f3a 60%, #0f1628 100%);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 28px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
    }
    .avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .profile-info { flex: 1; }
    .profile-name { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .profile-meta { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 6px; }
    .meta-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); }
    .meta-item svg { width: 14px; height: 14px; }
    .tab-bar { display: flex; gap: 8px; flex-wrap: wrap; }
    .tab-btn {
      padding: 8px 18px; border-radius: var(--radius-sm); font-size: 13px;
      font-weight: 600; border: none; cursor: pointer; font-family: inherit;
      transition: all .18s;
    }
    .tab-btn.active { background: linear-gradient(135deg, var(--blue), #3b6ed4); color: #fff; }
    .tab-btn:not(.active) { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .tab-btn:not(.active):hover { color: var(--text); }
    .history-table { width: 100%; border-collapse: collapse; }
    .history-table thead th {
      padding: 10px 14px; text-align: right; font-size: 11px; font-weight: 600;
      letter-spacing: .07em; color: var(--text-muted); text-transform: uppercase;
      background: var(--surface2); white-space: nowrap; border-bottom: 1px solid var(--border);
    }
    .history-table tbody tr { border-bottom: 1px solid #1e2336; transition: background .16s; }
    .history-table tbody tr:hover { background: rgba(79,142,247,.04); }
    .history-table tbody td { padding: 11px 14px; font-size: 13px; }
    .type-pill {
      padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 700;
    }
    .type-annual { background: var(--green-dim); color: var(--green); }
    .type-casual { background: var(--blue-dim); color: var(--blue); }
    .delete-btn {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      padding: 4px 6px; border-radius: 6px; transition: all .18s;
    }
    .delete-btn:hover { background: var(--red-dim); color: var(--red); }
    .delete-btn svg { width: 14px; height: 14px; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-muted); font-size: 13px; text-decoration: none; transition: color .18s;
    }
    .back-link:hover { color: var(--blue); }
    .back-link svg { width: 16px; height: 16px; }
    .empty-state { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }
    .balance-card {
      background: linear-gradient(135deg, rgba(79, 142, 247, .10), rgba(155, 89, 182, .08));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }
    .balance-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: rgba(255,255,255,.92); }
    .balance-grid { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; align-items: end; }
    .balance-field { display: flex; flex-direction: column; gap: 6px; }
    .balance-field label { font-size: 12px; font-weight: 700; color: rgba(255,255,255,.72); }
    .balance-field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 9px 12px;
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }
    .balance-save { align-self: end; white-space: nowrap; }
    @media (max-width: 900px) {
      .balance-grid { grid-template-columns: 1fr; }
      .balance-save { width: 100%; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
          </svg>
        </div>
        <span class="brand-name">نظام <span class="accent">الموارد</span></span>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <a class="btn btn-ghost" href="/">الشهر</a>
        <a class="btn btn-ghost" href="/upload">رفع ملف</a>
        <a class="btn btn-ghost" href="/dashboard">الداشبورد</a>
        <a class="btn btn-primary" href="/departments-page">الإدارات</a>
        <a class="btn btn-danger" href="/logout">خروج</a>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="backRow">
      <a class="back-link" href="/departments-page">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        العودة
      </a>
    </div>

    <!-- Profile Card -->
    <div class="profile-card" id="profileCard">
      <div class="avatar" id="profileAvatar">…</div>
      <div class="profile-info">
        <div class="profile-name" id="profileName">جارٍ التحميل…</div>
        <div class="profile-meta" id="profileMeta"></div>
      </div>
      <span class="pill pill-active" id="profileStatus" style="align-self:flex-start"></span>
    </div>

    <!-- KPI Row -->
    <section class="kpi-grid" id="kpiRow"></section>

    <section class="balance-card" id="balanceCard">
      <div class="balance-title">رصيد الإجازات (إدخال يدوي لكل موظف)</div>
      <div class="balance-grid">
        <div class="balance-field">
          <label>رصيد سنوية (يوم)</label>
          <input type="number" id="allowAnnual" min="0" step="0.5" value="0" />
        </div>
        <div class="balance-field">
          <label>رصيد عارضة (يوم)</label>
          <input type="number" id="allowCasual" min="0" step="0.5" value="0" />
        </div>
        <button class="btn btn-primary balance-save" onclick="saveLeaveBalances()">حفظ الرصيد</button>
      </div>
    </section>

    <!-- Tab Bar + History -->
    <section class="table-card">
      <div class="table-header">
        <div class="tab-bar">
          <button class="tab-btn active" id="tabLeaves" onclick="switchTab('leaves')">الإجازات</button>
          <button class="tab-btn" id="tabPerms" onclick="switchTab('perms')">الأذونات</button>
          <button class="tab-btn" id="tabDeducts" onclick="switchTab('deducts')">الخصومات</button>
        </div>
        <span class="badge" id="histCount">0</span>
      </div>
      <div class="table-wrap" id="historyContainer">
        <div class="empty-state">جارٍ التحميل…</div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast"></div>
  <script>
    const empId = location.pathname.split('/employee-page/')[1];
    let leavesData = [], permsData = [], deductsData = [];
    let currentTab = 'leaves';

    function showToast(msg, type='success') {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = `toast ${type} show`;
      setTimeout(() => { t.className = 'toast'; }, 3500);
    }

    function initials(name) {
      return (name||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase() || '?';
    }

    function deptShort(raw) {
      if (!raw) return '—';
      const re = /all\s*departments\s*>\s*القوة\s*>/i;
      if (re.test(raw)) return raw.replace(re,'').trim()||raw;
      const idx = raw.indexOf('القوة>');
      if (idx !== -1) return raw.slice(idx+'القوة>'.length).trim()||raw;
      return raw;
    }

    async function loadProfile() {
      try {
        const r = await fetch(`/employees/${empId}/summary`);
        const emp = await r.json();

        // Back link with dept
        const deptEnc = encodeURIComponent(emp.dept||'');
        document.getElementById('backRow').innerHTML = `
          <a class="back-link" href="/department/${deptEnc}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
            العودة لـ ${deptShort(emp.dept)}
          </a>`;

        document.getElementById('profileAvatar').textContent = initials(emp.name);
        document.getElementById('profileName').textContent = emp.name;
        document.getElementById('profileStatus').textContent = emp.status==='active'?'نشط':'غير نشط';
        document.getElementById('profileStatus').className = `pill ${emp.status==='active'?'pill-active':'pill-inactive'}`;
        document.getElementById('profileMeta').innerHTML = `
          <div class="meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
            ${deptShort(emp.dept)}
          </div>
          <div class="meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            ${emp.job_title||'—'}
          </div>
          <div class="meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 17 3 17 3 10 12 3 21 10 21 17 17 17"/><rect x="7" y="17" width="10" height="7"/></svg>
            كود: ${emp.employee_code||'—'}
          </div>`;

        const fmt = v => (Number(v||0)%1===0)?Number(v||0):(Number(v||0)).toFixed(1);
        document.getElementById('allowAnnual').value = fmt(emp.leave_allowance_annual_days || 0);
        document.getElementById('allowCasual').value = fmt(emp.leave_allowance_casual_days || 0);
        document.getElementById('kpiRow').innerHTML = `
          <div class="kpi-card"><div class="kpi-icon kpi-green">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div><div class="kpi-body"><span class="kpi-label">رصيد سنوية</span><span class="kpi-value" style="color:var(--green)">${fmt(emp.leave_allowance_annual_days)}</span></div></div>
          <div class="kpi-card"><div class="kpi-icon kpi-green">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18"/><path d="M12 3v18"/></svg>
            </div><div class="kpi-body"><span class="kpi-label">مستخدم سنوية</span><span class="kpi-value" style="color:var(--green)">${fmt(emp.total_annual_leave)}</span></div></div>
          <div class="kpi-card"><div class="kpi-icon kpi-green">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
            </div><div class="kpi-body"><span class="kpi-label">المتبقي سنوية</span><span class="kpi-value" style="color:var(--green)">${fmt(emp.annual_leave_remaining_days)}</span></div></div>

          <div class="kpi-card"><div class="kpi-icon kpi-blue">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div><div class="kpi-body"><span class="kpi-label">رصيد عارضة</span><span class="kpi-value" style="color:var(--blue)">${fmt(emp.leave_allowance_casual_days)}</span></div></div>
          <div class="kpi-card"><div class="kpi-icon kpi-blue">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18"/><path d="M12 3v18"/></svg>
            </div><div class="kpi-body"><span class="kpi-label">مستخدم عارضة</span><span class="kpi-value" style="color:var(--blue)">${fmt(emp.total_casual_leave)}</span></div></div>
          <div class="kpi-card"><div class="kpi-icon kpi-blue">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
            </div><div class="kpi-body"><span class="kpi-label">المتبقي عارضة</span><span class="kpi-value" style="color:var(--blue)">${fmt(emp.casual_leave_remaining_days)}</span></div></div>

          <div class="kpi-card"><div class="kpi-icon kpi-orange">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div><div class="kpi-body"><span class="kpi-label">ساعات إذن</span><span class="kpi-value" style="color:var(--orange)">${fmt(emp.total_permission_hours)}</span></div></div>
          <div class="kpi-card"><div class="kpi-icon kpi-red">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><rect x="6" y="6" width="12" height="16" rx="2"/></svg>
            </div><div class="kpi-body"><span class="kpi-label">خصم (أيام)</span><span class="kpi-value" style="color:var(--red)">${fmt(emp.total_deduction_days)}</span></div></div>
          <div class="kpi-card"><div class="kpi-icon kpi-purple">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div><div class="kpi-body"><span class="kpi-label">المتبقي النهائي</span><span class="kpi-value" style="color:var(--purple)">${fmt(emp.leave_remaining_days)}</span></div></div>`;
      } catch {
        showToast('فشل تحميل بيانات الموظف','error');
      }
    }

    async function saveLeaveBalances() {
      const a = Number(document.getElementById('allowAnnual').value);
      const c = Number(document.getElementById('allowCasual').value);
      if (!Number.isFinite(a) || a < 0 || !Number.isFinite(c) || c < 0) { showToast('ادخل أرقام صحيحة للرصيد','error'); return; }
      const r = await fetch(`/employees/${empId}`, {
        method: 'PUT',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ leave_allowance_annual_days: a, leave_allowance_casual_days: c })
      });
      if (!r.ok) {
        const j = await r.json().catch(() => null);
        showToast((j && j.detail) ? j.detail : 'فشل الحفظ','error');
        return;
      }
      showToast('تم حفظ الرصيد ✓');
      await loadProfile();
    }

    async function loadHistory() {
      try {
        const [lR, pR, dR] = await Promise.all([
          fetch(`/employees/${empId}/leaves`),
          fetch(`/employees/${empId}/permissions`),
          fetch(`/employees/${empId}/deductions`),
        ]);
        leavesData = await lR.json();
        permsData = await pR.json();
        deductsData = await dR.json();
        renderTab();
      } catch { showToast('فشل تحميل السجلات','error'); }
    }

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tabLeaves').className  = 'tab-btn'+(tab==='leaves'?' active':'');
      document.getElementById('tabPerms').className   = 'tab-btn'+(tab==='perms'?' active':'');
      document.getElementById('tabDeducts').className = 'tab-btn'+(tab==='deducts'?' active':'');
      renderTab();
    }

    async function deleteRecord(type, id) {
      if (!confirm('هل تريد حذف هذا السجل؟')) return;
      let url;
      if (type==='leave') url=`/employees/${empId}/leaves/${id}`;
      else if (type==='perm') url=`/employees/${empId}/permissions/${id}`;
      else url=`/employees/${empId}/deductions/${id}`;
      const r = await fetch(url, {method:'DELETE'});
      if (!r.ok) { showToast('فشل الحذف','error'); return; }
      showToast('تم الحذف'); await loadHistory(); await loadProfile();
    }

    function renderTab() {
      const container = document.getElementById('historyContainer');
      const trashIco = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

      if (currentTab === 'leaves') {
        document.getElementById('histCount').textContent = leavesData.length;
        if (!leavesData.length) { container.innerHTML='<div class="empty-state">لا توجد إجازات مسجلة.</div>'; return; }
        container.innerHTML = `<table class="history-table">
          <thead><tr><th>النوع</th><th>الأيام</th><th>التاريخ</th><th>ملاحظة</th><th></th></tr></thead>
          <tbody>${leavesData.map(l=>`<tr>
            <td><span class="type-pill ${l.leave_type==='annual'?'type-annual':'type-casual'}">${l.leave_type==='annual'?'سنوية':'عارضة'}</span></td>
            <td>${l.days%1===0?l.days:l.days.toFixed(1)} يوم</td><td>${l.date}</td>
            <td>${l.note||'—'}</td>
            <td><button class="delete-btn" onclick="deleteRecord('leave',${l.id})" title="حذف">${trashIco}</button></td>
          </tr>`).join('')}</tbody></table>`;
      } else if (currentTab === 'perms') {
        document.getElementById('histCount').textContent = permsData.length;
        if (!permsData.length) { container.innerHTML='<div class="empty-state">لا توجد أذونات مسجلة.</div>'; return; }
        container.innerHTML = `<table class="history-table">
          <thead><tr><th>الساعات</th><th>التاريخ</th><th>ملاحظة</th><th></th></tr></thead>
          <tbody>${permsData.map(p=>`<tr>
            <td><span class="type-pill type-casual">${p.hours%1===0?p.hours:p.hours.toFixed(1)} ساعة</span></td>
            <td>${p.date}</td><td>${p.note||'—'}</td>
            <td><button class="delete-btn" onclick="deleteRecord('perm',${p.id})" title="حذف">${trashIco}</button></td>
          </tr>`).join('')}</tbody></table>`;
      } else {
        const daysOnly = deductsData.filter(d => d.deduction_type === 'days');
        document.getElementById('histCount').textContent = daysOnly.length;
        if (!daysOnly.length) { container.innerHTML='<div class="empty-state">لا توجد خصومات مسجلة.</div>'; return; }
        container.innerHTML = `<table class="history-table">
          <thead><tr><th>أيام الخصم</th><th>التاريخ</th><th>السبب</th><th></th></tr></thead>
          <tbody>${daysOnly.map(d=>`<tr>
            <td><span class="type-pill" style="background:var(--red-dim);color:var(--red)">${d.amount%1===0?d.amount:d.amount.toFixed(1)} يوم</span></td>
            <td>${d.date}</td><td>${d.reason||'—'}</td>
            <td><button class="delete-btn" onclick="deleteRecord('deduct',${d.id})" title="حذف">${trashIco}</button></td>
          </tr>`).join('')}</tbody></table>`;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadProfile();
      loadHistory();
    });
  </script>
</body>
</html>
